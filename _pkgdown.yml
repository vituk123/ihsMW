url: https://vituk123.github.io/ihsMW
title: ihsMW — Clean & Harmonise Malawi IHS Data in R
description: >
  An offline suite of tools to clean, aggregate, and harmonise data 
  from the 'Malawi Integrated Household Survey' ('IHS'). Provides crop-specific 
  unit conversions, stratified winsorization, and automatic cross-round harmonisation 
  for complex survey designs.

template:
  bootstrap: 5
  bslib:
    primary: "#1a6b4a"
    base_font: {google: "Source Sans Pro"}
    heading_font: {google: "Source Serif Pro"}
    code_font: {google: "JetBrains Mono"}

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [github]
  components:
    intro:
      text: Get started
      href: articles/getting-started.html
    articles:
      text: Articles
      menu:
        - text: Getting started
          href: articles/getting-started.html
        - text: Cross-round harmonisation
          href: articles/harmonisation.html
        - text: Survey weights
          href: articles/survey-weights.html
    github:
      icon: fab fa-github
      href: https://github.com/vituk123/ihsMW
      aria-label: GitHub

reference:
  - title: "Discover & Harmonise"
    desc: "Functions for exploring variable metadata and performing cross-round alignment"
    contents:
      - ihs_search
      - ihs_harmonise
      - ihs_crosswalk_check
  - title: "Data Cleaning Suite"
    desc: "Robust offline data cleaning, winsorization, and missing code conversion"
    contents:
      - ihs_clean
      - ihs_standardize_missing
      - ihs_winsorize
  - title: "Agriculture & Aggregation"
    desc: "NSO crop conversion factor calculations and household-level aggregation tools"
    contents:
      - ihs_convert_units
      - ihs_aggregate

footer:
  structure:
    left: built_with
    right: data
  components:
    built_with: "Built with [pkgdown](https://pkgdown.r-lib.org/)"
    data: "Data: [NSO Malawi](https://www.nsomalawi.mw/) / [World Bank LSMS](https://www.worldbank.org/en/programs/lsms)"

